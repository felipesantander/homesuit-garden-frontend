<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="garden_homesuit">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Garden HomeSuit</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #0F172A;
      margin: 0;
      padding: 0;
    }

    #loading-indicator {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
    }

    .spinner-container {
      width: 120px;
      height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .loader-logo {
      width: 300px;
      height: auto;
      filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.3));
      animation: logo-pulse 2s infinite ease-in-out;
    }

    .loading-label {
      margin-top: 24px;
      color: #F8FAFC;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    @keyframes logo-pulse {

      0%,
      100% {
        transform: scale(1);
        filter: drop-shadow(0 0 10px rgba(16, 185, 129, 0.2));
      }

      50% {
        transform: scale(1.1);
        filter: drop-shadow(0 0 25px rgba(16, 185, 129, 0.5));
      }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(30px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
  </style>
</head>

<body>
  <div id="loading-indicator">
    <div class="loader-card">
      <div class="spinner-container">
        <img src="homesuit.png" alt="HomeSuit Logo" class="loader-logo" />
      </div>
    </div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loadingIndicator = document.getElementById('loading-indicator');
      if (loadingIndicator) {
        loadingIndicator.style.transition = 'opacity 0.6s ease-out';
        loadingIndicator.style.opacity = '0';
        setTimeout(function () {
          loadingIndicator.remove();
        }, 600);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
