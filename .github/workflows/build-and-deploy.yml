name: build and deploy garden

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: Deploy-${{ github.run_number }}
  cancel-in-progress: false

jobs:
  auto-release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Check if commit should skip release
        id: check_skip
        run: |
          if git log -1 --pretty=%B | grep -q "\[skip release\]"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump patch version automatically
        id: bump
        if: steps.check_skip.outputs.skip == 'false'
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          IFS='.' read -r major minor patch <<< "$VERSION"
          
          # Auto-increment patch version
          patch=$((patch + 1))
          
          NEW_VERSION="$major.$minor.$patch"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          sed -i "s/version: $VERSION/version: $NEW_VERSION/" pubspec.yaml

      - name: Commit and push version bump
        if: steps.check_skip.outputs.skip == 'false'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to v${{ env.NEW_VERSION }} [skip release]"
          git tag v${{ env.NEW_VERSION }}
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.check_skip.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: Release v${{ env.NEW_VERSION }}
          generate_release_notes: true
          token: ${{ secrets.GH_PAT }}
          
  build-and-push-image:
    needs: auto-release
    runs-on: ubuntu-latest
    if: always() && (needs.auto-release.result == 'success' || needs.auto-release.result == 'skipped')
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.auto-release.outputs.new_version && format('v{0}', needs.auto-release.outputs.new_version) || github.ref }}
    
    - name: Set IMAGE_TAG
      run: |
        if [ -n "${{ needs.auto-release.outputs.new_version }}" ]; then
          echo "IMAGE_TAG=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:v${{ needs.auto-release.outputs.new_version }}" >> $GITHUB_ENV
        else
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          echo "IMAGE_TAG=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:v$VERSION" >> $GITHUB_ENV
        fi

    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Build Flutter Web
      run: |
        flutter pub get
        flutter build web --release --dart-define=URL_HOST=https://garden.api.homesuite.cl

    - name: Login to GHCR
      run: |
        echo ${{ secrets.GH_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build and push Docker image
      run: | 
        docker build --tag ${{ env.IMAGE_TAG }} -f docker/Dockerfile .
        docker push ${{ env.IMAGE_TAG }}

  push-image-to-ec2:
    needs: [auto-release, build-and-push-image]
    name: Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set IMAGE_TAG
        id: set_tag
        run: |
          if [ -n "${{ needs.auto-release.outputs.new_version }}" ]; then
            echo "IMAGE_TAG=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:v${{ needs.auto-release.outputs.new_version }}" >> $GITHUB_ENV
          else
            VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
            echo "IMAGE_TAG=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:v$VERSION" >> $GITHUB_ENV
          fi
      
      - name: Copy files and pull image on EC2
        env:
            PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
            HOSTNAME: ${{ secrets.EC2_PUBLIC_IP_ADDRESS}}
            USER_NAME: ${{secrets.EC_USER}}
        run: |
          echo "$PRIVATE_KEY" > private_key && chmod 600 private_key
          ssh -o StrictHostKeyChecking=no -i private_key ${USER_NAME}@${HOSTNAME} "
          echo ${{ secrets.GH_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ${{ env.IMAGE_TAG }}"
