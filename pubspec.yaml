name: garden_homesuit
description: "Garden HomeSuit - IoT Garden Monitoring App"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  dio: ^5.9.0
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  hooks_riverpod: ^3.0.3
  intl: ^0.19.0
  responsive_framework: ^1.5.1
  go_router: ^14.7.2
  shared_preferences: ^2.3.3
  syncfusion_flutter_charts: ^32.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/garden_logo.png
    - assets/images/garden_logo_2.png
    - assets/images/garden_logo_3.png
    - assets/images/mobile_garden_logo.png
    - assets/images/homesuit.png